{% extends "base.html" %}
{% block title %}Changer le mot de passe — ThermoVLE{% endblock %}
{% block extra_style %}
<style>
body { background:var(--cream); display:flex; align-items:center; justify-content:center; min-height:100vh; }
.card { background:var(--warm-white); border:1px solid var(--border); border-radius:24px; padding:48px 44px; width:420px; box-shadow:0 20px 60px rgba(28,26,22,0.10); }
h1 { font-family:'Playfair Display',serif; font-size:24px; margin-bottom:6px; }
.subtitle { font-size:14px; color:var(--text-light); margin-bottom:32px; }
.field { margin-bottom:18px; }
label { display:block; font-size:13px; font-weight:500; color:var(--text-mid); margin-bottom:8px; }
input[type=password] { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-dark); background:var(--cream); transition:all 0.2s; outline:none; }
input:focus { border-color:var(--amber); background:white; box-shadow:0 0 0 3px rgba(212,137,10,0.1); }
.btn-primary { width:100%; padding:14px; background:linear-gradient(135deg,var(--copper),var(--amber)); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:8px; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(212,137,10,0.35); }
.link-row { text-align:center; font-size:14px; color:var(--text-light); margin-top:20px; }
.link-row a { color:var(--teal); text-decoration:none; font-weight:500; }
</style>
{% endblock %}
{% block content %}
<div class="card">
  <h1>🔑 Changer le mot de passe</h1>
  <p class="subtitle">Saisissez votre ancien mot de passe pour en définir un nouveau.</p>
  <form method="POST">
    <div class="field">
      <label>Ancien mot de passe</label>
      <input type="password" name="old_password" placeholder="Votre mot de passe actuel" required>
    </div>
    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" name="new_password" placeholder="Minimum 6 caractères" required>
    </div>
    <div class="field">
      <label>Confirmer le nouveau mot de passe</label>
      <input type="password" name="confirm" placeholder="Répétez le nouveau mot de passe" required>
    </div>
    <button type="submit" class="btn-primary">Mettre à jour →</button>
  </form>
  <div class="link-row"><a href="/">← Retour à l'application</a></div>
</div>
{% endblock %}
